name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip autoconf libtool pkg-config \
            zlib1g-dev cmake libffi-dev libssl-dev openjdk-17-jdk zip unzip
          pip install buildozer cython virtualenv

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          buildozer android debug 2>&1 || true
          # p4a sometimes fails finding aidl, fix and retry
          AIDL_BIN=$(find "$ANDROID_SDK_ROOT" -name aidl -type f 2>/dev/null | head -1)
          if [ -n "$AIDL_BIN" ]; then
            sudo cp "$AIDL_BIN" /usr/local/bin/aidl
            buildozer android debug
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EnemyDetector-APK
          path: bin/*.apk
