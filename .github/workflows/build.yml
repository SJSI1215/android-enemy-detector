name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: buildozer android debug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: EnemyDetector-APK
          path: bin/*.apk
